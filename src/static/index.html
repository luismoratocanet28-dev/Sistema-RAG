<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema RAG Premium | Inteligencia Documental</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .chat-container {
            margin-bottom: 30px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px 20px;
            border-radius: 16px;
            max-width: 85%;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }

        .ai-message {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .input-group {
            display: flex;
            gap: 12px;
            position: relative;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 20px;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        #fileInput {
            display: none;
        }

        .file-label {
            cursor: pointer;
            width: 100%;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Sistema RAG Premium</h1>
        <p class="subtitle">Consulta tus documentos con Inteligencia Artificial</p>

        <div class="chat-container" id="chatContainer">
            <div class="message ai-message">
                ¡Hola Luis! Soy tu sistema RAG. ¿En qué puedo ayudarte hoy con la información de tus documentos?
            </div>
        </div>

        <div class="upload-btn">
            <label for="fileInput" class="file-label" id="fileLabel">
                📁 Haz clic aquí para subir PDF o TXT
            </label>
            <input type="file" id="fileInput" accept=".pdf,.txt">
            <div id="uploadStatus" style="font-size: 0.8rem; text-align: center; display: none;"></div>
        </div>

        <form id="ragForm" class="input-group">
            <input type="text" id="queryInput" placeholder="Escribe tu pregunta aquí..." required autocomplete="off">
            <button type="submit" id="submitBtn">
                <span id="btnText">Preguntar</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('ragForm');
        const input = document.getElementById('queryInput');
        const chatContainer = document.getElementById('chatContainer');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');

        function appendMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const uploadStatus = document.getElementById('uploadStatus');

        fileInput.addEventListener('change', async () => {
            const file = fileInput.files[0];
            if (!file) return;

            uploadStatus.style.display = 'block';
            uploadStatus.innerText = `Subiendo ${file.name}...`;
            uploadStatus.style.color = 'var(--text-muted)';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.message) {
                    uploadStatus.innerText = data.message;
                    uploadStatus.style.color = 'var(--accent)';
                    appendMessage(`Sistema: He aprendido el contenido de "${file.name}".`, false);
                } else {
                    uploadStatus.innerText = "Error al subir.";
                    uploadStatus.style.color = '#ef4444';
                }
            } catch (error) {
                uploadStatus.innerText = "Error de conexión.";
                uploadStatus.style.color = '#ef4444';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = input.value.trim();
            if (!query) return;

            // UI State
            input.value = '';
            appendMessage(query, true);
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';

            try {
                const formData = new FormData();
                formData.append('query', query);

                const response = await fetch('/ask', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.answer) {
                    appendMessage(data.answer, false);
                } else if (data.error) {
                    appendMessage("Error: " + data.error, false);
                }
            } catch (error) {
                appendMessage("Error de conexión con el servidor.", false);
            } finally {
                submitBtn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        });
    </script>
</body>

</html>
